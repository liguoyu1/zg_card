name: warring_states_card
description: Warring States themed card battle game
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  
  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  
  # Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Game Engine
  flame: ^1.8.0
  
  # Animation
  lottie: ^3.0.0
  
  # Audio
  audioplayers: ^5.2.0
  
  # Utils
  uuid: ^4.2.0
  equatable: ^2.0.5
  collection: ^1.18.0
  fast_immutable_collections: ^9.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  
  # assets:
  #   - assets/images/
  #   - assets/sounds/
  #   - assets/fonts/
  #   - assets/configs/