<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 98" width="80" height="98">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A3728"/>
      <stop offset="50%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#2C1810"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect x="0" y="0" width="80" height="98" rx="4" ry="4" fill="url(#bg)"/>
  <!-- Outer border -->
  <rect x="2" y="2" width="76" height="94" rx="3" ry="3" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  <!-- Inner border -->
  <rect x="5" y="5" width="70" height="88" rx="2" ry="2" fill="none" stroke="#8B6914" stroke-width="0.5" stroke-opacity="0.5"/>
  <!-- Center Warring States seal design -->
  <!-- Outer circle -->
  <circle cx="40" cy="49" r="18" fill="none" stroke="url(#gold)" stroke-width="1.2"/>
  <!-- Inner circle -->
  <circle cx="40" cy="49" r="14" fill="none" stroke="#B8860B" stroke-width="0.8" stroke-opacity="0.6"/>
  <!-- Center character: 戰 (war) stylized -->
  <text x="40" y="54" font-family="serif" font-size="16" fill="#DAA520" text-anchor="middle" font-weight="bold">戰</text>
  <!-- Decorative dots around circle -->
  <circle cx="40" cy="31" r="1.5" fill="#DAA520" fill-opacity="0.6"/>
  <circle cx="40" cy="67" r="1.5" fill="#DAA520" fill-opacity="0.6"/>
  <circle cx="22" cy="49" r="1.5" fill="#DAA520" fill-opacity="0.6"/>
  <circle cx="58" cy="49" r="1.5" fill="#DAA520" fill-opacity="0.6"/>
  <!-- Corner diamond ornaments -->
  <rect x="8" y="10" width="4" height="4" rx="1" fill="#DAA520" fill-opacity="0.4" transform="rotate(45,10,12)"/>
  <rect x="68" y="10" width="4" height="4" rx="1" fill="#DAA520" fill-opacity="0.4" transform="rotate(45,70,12)"/>
  <rect x="8" y="84" width="4" height="4" rx="1" fill="#DAA520" fill-opacity="0.4" transform="rotate(45,10,86)"/>
  <rect x="68" y="84" width="4" height="4" rx="1" fill="#DAA520" fill-opacity="0.4" transform="rotate(45,70,86)"/>
</svg>